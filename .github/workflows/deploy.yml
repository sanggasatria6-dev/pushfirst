name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -euo pipefail
            cd "${{ secrets.VPS_REPO_DIR }}"
            git fetch origin
            git reset --hard origin/main
            bash "${{ secrets.VPS_REPO_DIR }}/scripts/deploy-vps.sh" "${{ secrets.VPS_REPO_DIR }}" "${{ secrets.VPS_APP_DIR }}" "${{ secrets.VPS_PHP_FPM_SERVICE }}"
          '
